server:
  port: 0

spring:
  application:
    name: analyzer

  datasource:
    url: jdbc:h2:mem:analyzer
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

grpc:
  client:
    hub-router:
      address: static://localhost:59090
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

analyzer:
  kafka:
    bootstrap-servers: localhost:9092
    snapshots-topic: telemetry.snapshots.v1
    hubs-topic: telemetry.hubs.v1
    snapshots-group-id: analyzer-snapshots
    hubs-group-id: analyzer-hubs